name: TWP SR Scan

on:
  schedule:
    # Full scan every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - top

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scan
        run: python scripts/scan.py ${{ github.event.inputs.mode || 'all' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/na_sr_results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TWP SR data $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi
